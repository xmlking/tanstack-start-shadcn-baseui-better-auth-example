# Blog Storage Services
# MinIO

services:
  ###########################################################################
  # minio
  # docker compose exec -it minio
  #
  # CREDENTIALS:      minioadmin/minioadmin
  # SERVICE URLS:
  #   MinIO API:      http://localhost:9000/
  #   MinIO Console:  http://localhost:9001/
  ###########################################################################
  minio:
    image: cgr.dev/chainguard/minio:latest
    hostname: minio
    container_name: minio
    restart: always
    # profiles: [optional]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  minio-init:
    image: minio/mc:latest
    # profiles: [optional]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc admin user add myminio ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY};
      mc admin policy attach myminio readwrite --user=${S3_ACCESS_KEY_ID};
      mc mb myminio/$${S3_IMAGES_BUCKET} --ignore-existing;
      mc mb myminio/$${S3_AGENTS_BUCKET} --ignore-existing;
      mc anonymous set download myminio/$${S3_IMAGES_BUCKET};
      echo 'MinIO app user and buckets created and configured';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-appuser}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-apppassword}
      S3_IMAGES_BUCKET: ${S3_IMAGES_BUCKET:-images}
      S3_AGENTS_BUCKET: ${S3_AGENTS_BUCKET:-agents}

volumes:
  minio_data:
